name: 정책 변경 요청

description: GitHub 운영 정책, 권한, 비용, 보류 항목 변경을 요청합니다.
title: "[Policy] "
body:
  - type: textarea
    id: request
    attributes:
      label: 요청 내용
      description: 변경하거나 결정해야 할 내용을 적어주세요.
    validations:
      required: true
  - type: dropdown
    id: tier
    attributes:
      label: 적용 범위
      options:
        - Free 티어에서 즉시 가능
        - GitHub Team 이상 필요
        - Enterprise 또는 SSO 필요
        - 별도 장비 또는 네트워크 검토 필요
        - 확인 필요
    validations:
      required: true
  - type: textarea
    id: reason
    attributes:
      label: 사유 및 기대 효과
    validations:
      required: true
  - type: textarea
    id: decision
    attributes:
      label: 결정 필요 사항
      value: |
        - [ ] Owner 2명 지정 여부
        - [ ] 적용 저장소
        - [ ] 비용 또는 별도 승인 필요 여부
    validations:
      required: false
