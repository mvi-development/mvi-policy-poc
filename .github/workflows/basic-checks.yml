name: basic-checks

on:
  pull_request:
    branches: ["main", "develop"]
  push:
    branches: ["main", "develop", "feature/**"]

permissions:
  contents: read

jobs:
  repository-standards:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check required governance files
        run: |
          set -euo pipefail
          required_files=(
            "README.md"
            "CONTRIBUTING.md"
            ".github/pull_request_template.md"
            ".github/ISSUE_TEMPLATE/policy-change.yml"
            "docs/free-tier-governance.md"
          )

          for file in "${required_files[@]}"; do
            if [ ! -s "$file" ]; then
              echo "Missing or empty required file: $file" >&2
              exit 1
            fi
          done

      - name: Check Free tier decision language
        run: |
          set -euo pipefail
          doc="docs/free-tier-governance.md"

          grep -Eq 'Free 티어|Free tier' "$doc"
          grep -Eq 'private repository|private repo' "$doc"
          grep -Eq 'Protected Branch|branch protection|Ruleset' "$doc"
