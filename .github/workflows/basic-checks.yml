name: basic-checks

on:
  pull_request:
    branches: ["main", "develop"]
  push:
    branches: ["main", "develop", "feature/**"]

permissions:
  contents: read

jobs:
  repository-standards:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check required governance files
        run: |
          set -euo pipefail
          test -s README.md
          test -s CONTRIBUTING.md
          test -s .github/pull_request_template.md
          test -s docs/free-tier-governance.md

      - name: Check Free tier decision language
        run: |
          set -euo pipefail
          grep -q 'Free 티어' docs/free-tier-governance.md
          grep -q 'private repository' docs/free-tier-governance.md
          grep -q 'Protected Branch' docs/free-tier-governance.md
